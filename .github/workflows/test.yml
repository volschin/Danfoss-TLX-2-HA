name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff homeassistant voluptuous

      - name: Compile check
        run: |
          python -m py_compile custom_components/danfoss_tlx/etherlynx.py
          python -m py_compile custom_components/danfoss_tlx/__init__.py
          python -m py_compile custom_components/danfoss_tlx/coordinator.py
          python -m py_compile custom_components/danfoss_tlx/sensor.py
          python -m py_compile custom_components/danfoss_tlx/config_flow.py

      - name: Lint with ruff
        run: ruff check custom_components/ tests/

      - name: Run tests with coverage
        run: pytest --cov=custom_components.danfoss_tlx --cov-report=term-missing --cov-fail-under=95 -v
