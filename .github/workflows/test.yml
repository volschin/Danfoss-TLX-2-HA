name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff homeassistant voluptuous

      - name: Verify etherlynx copies are identical
        run: diff custom_components/danfoss_tlx/etherlynx.py danfoss_etherlynx.py

      - name: Compile check
        run: |
          python -m py_compile custom_components/danfoss_tlx/etherlynx.py
          python -m py_compile custom_components/danfoss_tlx/__init__.py
          python -m py_compile custom_components/danfoss_tlx/coordinator.py
          python -m py_compile custom_components/danfoss_tlx/sensor.py
          python -m py_compile custom_components/danfoss_tlx/config_flow.py

      - name: Lint with ruff
        run: ruff check custom_components/ tests/

      - name: Run tests with coverage
        run: pytest --cov=custom_components.danfoss_tlx --cov-report=term-missing --cov-fail-under=85 -v
