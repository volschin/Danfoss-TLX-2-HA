name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov ruff homeassistant voluptuous

      - name: Compile check
        run: |
          python -m py_compile custom_components/danfoss_tlx/etherlynx.py
          python -m py_compile custom_components/danfoss_tlx/__init__.py
          python -m py_compile custom_components/danfoss_tlx/coordinator.py
          python -m py_compile custom_components/danfoss_tlx/sensor.py
          python -m py_compile custom_components/danfoss_tlx/config_flow.py

      - name: Lint with ruff
        run: ruff check custom_components/ tests/

      - name: Run tests with coverage
        run: pytest --cov=custom_components.danfoss_tlx --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=95 -v

      - name: Upload results to Codecov
        # Nur bei push (main) — verhindert Secret-Exposition gegenüber PR-gesteuertem Code
        if: github.event_name == 'push'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
