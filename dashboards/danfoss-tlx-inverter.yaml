# ============================================================================
# Danfoss TLX Pro — Inverter Dashboard (Home Assistant 2026.2)
# ============================================================================
#
# Verwendung:
#   1. In HA: Einstellungen > Dashboards > Dashboard hinzufuegen
#   2. Dashboard oeffnen > Bearbeiten > Roher Konfigurationseditor
#   3. Diesen Inhalt einfuegen
#   4. Entity-IDs anpassen (siehe unten)
#
# Entity-IDs anpassen:
#   HA generiert entity_ids nach dem Muster:
#     sensor.<geraetename>_<sensorname>
#   z.B. sensor.danfoss_tlx_pro_tlx_123456_netzleistung_gesamt
#
#   Dieses Dashboard verwendet Platzhalter mit Platzhalter-Seriennummer:
#     sensor.danfoss_tlx_pro_<SERIAL>_netzleistung_gesamt
#
#   Suche-und-Ersetze: "sensor.danfoss_tlx_pro_<SERIAL>_" → "sensor.danfoss_tlx_pro_DEINE_SERIAL_"
#   Deine Entity-IDs findest du unter Einstellungen > Geraete > Danfoss TLX Pro.
#
# Voraussetzung: Danfoss TLX Pro Integration (2 PV-Strings Konfiguration)
# ============================================================================

views:
  - title: Danfoss TLX Pro
    type: sections
    max_columns: 4
    dense_section_placement: true
    sections:

      # ================================================================
      # BEREICH 1: Status & Aktuelle Leistung
      # ================================================================
      - type: grid
        cards:
          - type: heading
            heading: Status
            heading_style: title
            icon: mdi:solar-power-variant
          - type: tile
            grid_options:
              columns: full
              rows: 1
            entity: sensor.danfoss_tlx_pro_<SERIAL>_betriebsmodus_2
            name: Betriebsmodus
            icon: mdi:solar-power
            color: green
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_software_version
            name: Firmware
            icon: mdi:chip
            grid_options:
              columns: 6
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_nennleistung
            name: Nennleistung
            icon: mdi:flash
            grid_options:
              columns: 3
              rows: 1
          - type: tile
            grid_options:
              columns: 12
              rows: 1
            entity: sensor.danfoss_tlx_pro_<SERIAL>_letztes_ereignis_2
            name: Letztes Ereignis
            icon: mdi:alert-circle-outline
            color: amber
            vertical: false
            features_position: bottom
          - type: gauge
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzleistung_gesamt
            name: Aktuelle Leistung
            unit: W
            needle: true
            min: 0
            max: 8000
            severity:
              green: 0
              yellow: 6000
              red: 7500
            grid_options:
              columns: 6
              rows: 4
          - type: entity
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzfrequenz_o
            name: Netzfrequenz
            icon: mdi:sine-wave
            grid_options:
              columns: 3
              rows: 1

      # ================================================================
      # BEREICH 2: Energieproduktion
      # ================================================================
      - type: grid
        cards:
          - type: heading
            heading: Energieproduktion
            heading_style: title
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.danfoss_tlx_pro_<SERIAL>_gesamtproduktion
            name: Gesamt (Lifetime)
            icon: mdi:counter
            grid_options:
              columns: full
              rows: 1
          - type: tile
            grid_options:
              columns: 12
              rows: 1
            entity: sensor.danfoss_tlx_pro_<SERIAL>_letztes_ereignis_2
            name: Letztes Ereignis
            icon: mdi:alert-circle-outline
            color: amber
            vertical: false
            features_position: bottom
          - type: entity
            entity: sensor.danfoss_tlx_pro_<SERIAL>_produktion_heute_log
            name: Heute
            icon: mdi:calendar-today
          - type: entity
            entity: sensor.danfoss_tlx_pro_<SERIAL>_produktion_diese_woche
            name: Akt. Woche
            icon: mdi:calendar-week
          - type: entity
            entity: sensor.danfoss_tlx_pro_<SERIAL>_produktion_diesen_monat
            name: Akt. Monat
            icon: mdi:calendar-month
          - type: entity
            entity: sensor.danfoss_tlx_pro_<SERIAL>_produktion_dieses_jahr
            icon: mdi:calendar
            name: Akt. Jahr

      # ================================================================
      # BEREICH 3: PV-Strings (DC-Seite)
      # ================================================================
      - type: grid
        cards:
          - type: heading
            heading: PV-Strings (DC)
            heading_style: title
            icon: mdi:solar-panel-large
          - type: gauge
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzleistung_gesamt
            name: Aktuelle Leistung
            unit: W
            needle: true
            min: 0
            max: 8000
            severity:
              green: 500
              yellow: 6000
              red: 7500
            grid_options:
              columns: full
              rows: 3
          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: heading
                    heading: String 1
                    heading_style: subtitle
                    icon: mdi:numeric-1-circle
                    grid_options:
                      columns: full
                      rows: auto
                  - type: tile
                    grid_options:
                      columns: 4
                      rows: 1
                    entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_leistung_string_1
                    name: Leistung
                    icon: mdi:flash
                    color: orange
                    vertical: false
                    features_position: bottom
                  - type: tile
                    entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_spannung_string_1
                    name: Spannung
                    icon: mdi:sine-wave
                    color: blue
                    grid_options:
                      columns: 4
                      rows: 1
                  - type: tile
                    grid_options:
                      columns: 4
                      rows: 1
                    entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_strom_string_1
                    name: Strom
                    icon: mdi:current-dc
                    color: cyan
                    vertical: false
                    features_position: bottom
              - type: vertical-stack
                cards:
                  - type: heading
                    heading: String 2
                    heading_style: subtitle
                    icon: mdi:numeric-2-circle
                  - type: tile
                    entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_leistung_string_2
                    name: Leistung
                    icon: mdi:flash
                    color: orange
                    grid_options:
                      columns: 4
                      rows: 1
                  - type: tile
                    entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_spannung_string_2
                    name: Spannung
                    icon: mdi:sine-wave
                    color: blue
                    grid_options:
                      columns: 4
                      rows: 1
                  - type: tile
                    entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_strom_string_2
                    name: Strom
                    icon: mdi:current-dc
                    color: cyan
                    grid_options:
                      columns: 4
                      rows: 1
          - type: history-graph
            title: Stringvergleich
            hours_to_show: 24
            entities:
              - entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_leistung_string_1
                name: String 1
              - entity: sensor.danfoss_tlx_pro_<SERIAL>_pv_leistung_string_2
                name: String 2
            grid_options:
              columns: 12
              rows: 3
      
      # ================================================================
      # BEREICH 4: Netz (AC-Seite)
      # ================================================================
      - type: grid
        cards:
          - type: heading
            heading: Netz (AC)
            heading_style: title
            icon: mdi:transmission-tower
          - type: heading
            heading: Phase L1
            heading_style: subtitle
            icon: mdi:alpha-l-circle
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzleistung_l1
            name: Leistung
            icon: mdi:flash
            color: red
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzspannung_l1
            name: Spannung
            icon: mdi:sine-wave
            color: blue
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzstrom_l1
            name: Strom
            icon: mdi:current-ac
            color: cyan
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            grid_options:
              columns: 4
              rows: 1
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzfrequenz_l1
            name: Frequenz
            icon: mdi:sine-wave
            vertical: false
            features_position: bottom
          - type: heading
            heading: Phase L2
            heading_style: subtitle
            icon: mdi:alpha-l-circle
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzleistung_l2
            name: Leistung
            icon: mdi:flash
            color: red
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzspannung_l2
            name: Spannung
            icon: mdi:sine-wave
            color: blue
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzstrom_l2
            name: Strom
            icon: mdi:current-ac
            color: cyan
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            grid_options:
              columns: 4
              rows: 1
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzfrequenz_l2
            name: Frequenz
            icon: mdi:sine-wave
            vertical: false
            features_position: bottom
          - type: heading
            heading: Phase L3
            heading_style: subtitle
            icon: mdi:alpha-l-circle
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzleistung_l3
            name: Leistung
            icon: mdi:flash
            color: red
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzspannung_l3
            name: Spannung
            icon: mdi:sine-wave
            color: blue
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzstrom_l3
            name: Strom
            icon: mdi:current-ac
            color: cyan
            grid_options:
              columns: 4
              rows: 1
          - type: tile
            grid_options:
              columns: 4
              rows: 1
            entity: sensor.danfoss_tlx_pro_<SERIAL>_netzfrequenz_l3
            name: Frequenz
            icon: mdi:sine-wave
            vertical: false
            features_position: bottom
          - type: history-graph
            title: Netzspannung (3 Phasen)
            hours_to_show: 24
            entities:
              - entity: sensor.danfoss_tlx_pro_<SERIAL>_netzspannung_l1
                name: L1
              - entity: sensor.danfoss_tlx_pro_<SERIAL>_netzspannung_l2
                name: L2
              - entity: sensor.danfoss_tlx_pro_<SERIAL>_netzspannung_l3
                name: L3
            grid_options:
              columns: 12
              rows: 3

